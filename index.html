<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#edf4fb" />
    <title>每日健康</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/app-icon-blue.png?v=2" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="dateLabel"></p>
          <h1>今天，也照顾好自己</h1>
          <button class="profile-pill" id="profileMenuButton" type="button">
            <span id="activeProfileAvatar">安</span>
            <strong id="activeProfileName">安安</strong>
            <small>切换</small>
          </button>
        </div>
        <button class="avatar" id="reminderButton" aria-label="开启 22 点提醒">
          <span>⏰</span>
        </button>
      </header>

      <section class="notice-card" id="reminderCard">
        <div>
          <strong id="reminderTitle">22:00 未完成提醒未开启</strong>
          <p id="reminderText">开启后，App 会在晚上 10 点提醒所有使用者还有哪些事项没完成。</p>
        </div>
        <button class="mini-button" id="enableReminder" type="button">开启</button>
      </section>

      <section class="progress-card" aria-label="今日进度">
        <div class="ring" id="progressRing">
          <div class="ring-center">
            <strong id="progressValue">0/3</strong>
            <span>今日完成</span>
          </div>
        </div>
        <div class="progress-copy">
          <p class="section-kicker">每日计划</p>
          <h2 id="progressTitle">慢慢来，先完成一件</h2>
          <p id="progressHint">规律的小事，也会带来很大的改变。</p>
          <div class="streak"><span>✦</span><strong id="streakValue">0</strong> 天连续坚持</div>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">
          <div>
            <p class="section-kicker">PEOPLE</p>
            <h2>使用者</h2>
          </div>
          <button class="text-button" id="addProfileButton" type="button">新增</button>
        </div>
        <div class="profile-list" id="profileList"></div>
      </section>

      <section class="section">
        <div class="section-heading">
          <div>
            <p class="section-kicker">TODAY</p>
            <h2>今日任务</h2>
          </div>
          <span class="muted" id="completionText">还未开始</span>
        </div>

        <div class="task-list">
          <button class="task-card medicine" data-task="medicine">
            <span class="task-icon" aria-hidden="true">💊</span>
            <span class="task-copy">
              <strong>按时吃药</strong>
              <small>今天的药物已经准备好了吗？</small>
            </span>
            <span class="checkmark" aria-hidden="true">✓</span>
          </button>

          <button class="task-card exercise" data-task="exercise">
            <span class="task-icon" aria-hidden="true">⌁</span>
            <span class="task-copy">
              <strong>完成运动</strong>
              <small>散步、拉伸或喜欢的运动都可以</small>
            </span>
            <span class="checkmark" aria-hidden="true">✓</span>
          </button>

          <button class="task-card weight" id="weightTask">
            <span class="task-icon" aria-hidden="true">⚖</span>
            <span class="task-copy">
              <strong>记录体重</strong>
              <small id="weightTaskHint">记录今天身体的变化</small>
            </span>
            <span class="checkmark" aria-hidden="true">✓</span>
          </button>
        </div>
      </section>

      <section class="section insight-section">
        <div class="section-heading">
          <div>
            <p class="section-kicker">TREND</p>
            <h2>最近体重</h2>
          </div>
          <strong class="current-weight" id="currentWeight">-- kg</strong>
        </div>
        <div class="chart-card">
          <div class="chart" id="weightChart" aria-label="近七天体重趋势"></div>
          <div class="chart-empty" id="chartEmpty">记录体重后，这里会出现趋势</div>
        </div>
      </section>
    </main>

    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>

    <section class="bottom-sheet" id="weightSheet" aria-modal="true" role="dialog" hidden>
      <div class="sheet-handle"></div>
      <button class="sheet-close" data-close-sheet aria-label="关闭">×</button>
      <p class="section-kicker">TODAY'S WEIGHT</p>
      <h2>记录今天的体重</h2>
      <p class="sheet-subtitle">每天在相近时间记录，趋势会更准确。</p>
      <label class="weight-input">
        <input id="weightInput" type="number" inputmode="decimal" min="20" max="300" step="0.1" placeholder="65.0" />
        <span>kg</span>
      </label>
      <button class="primary-button" id="saveWeight">保存记录</button>
    </section>

    <section class="bottom-sheet" id="profileSheet" aria-modal="true" role="dialog" hidden>
      <div class="sheet-handle"></div>
      <button class="sheet-close" data-close-sheet aria-label="关闭">×</button>
      <p class="section-kicker">NEW PERSON</p>
      <h2>新增使用者</h2>
      <p class="sheet-subtitle">每个人会有独立的打卡、体重和趋势记录。</p>
      <label class="name-input">
        <span>姓名</span>
        <input id="profileNameInput" type="text" maxlength="12" placeholder="例如：爸爸" />
      </label>
      <button class="primary-button" id="saveProfile">保存使用者</button>
    </section>

    <div class="toast" id="toast" role="status"></div>
    <script src="app.js"></script>
  </body>
</html>
